<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>simweb — AI-simulated internet</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2300d4ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='system-ui' font-weight='800' font-size='17' fill='white'%3Es%3C/text%3E%3C/svg%3E" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src 'self' data:; connect-src 'self' https://*.supabase.co; font-src 'self' data:;">
</head>
<body>
  <header id="topnav" class="topnav"></header>
  <main class="page">
    <section class="home-head">
      <div>
        <h1>AI-simulated <span class="accent">internet</span></h1>
        <p class="lede">Every site here is hallucinated in real time. Click a card to step inside — or make your own.</p>
      </div>
      <span class="grow"></span>
      <div class="sortbar" role="tablist" aria-label="Sort feed">
        <button class="active" data-sort="new">New</button>
        <button data-sort="hot">Hot</button>
        <button data-sort="top">Top</button>
      </div>
    </section>
    <section id="feed" class="feed" aria-live="polite"></section>
    <div id="feedMore" class="feed-loadmore"></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="simweb.js"></script>
  <script src="feed.js"></script>
</body>
</html>
